micronaut:
  application:
    name: renalo
  security:
    authentication: bearer
    intercept-url-map:
      - pattern: /assets/**
        access:
          - isAnonymous()
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: ${JWT_GENERATOR_SIGNATURE_SECRET:`change-this-development-secret-change-before-production`}
  router:
    static-resources:
      default:
        enabled: true
        mapping: /assets/**
        paths: classpath:public/assets

datasources:
  default:
    url: ${JDBC_URL:`jdbc:postgresql://localhost:5432/renalo`}
    username: ${JDBC_USER:renalo}
    password: ${JDBC_PASSWORD:renalo}
    driver-class-name: org.postgresql.Driver

flyway:
  datasources:
    default:
      enabled: true

renalo:
  default-admin:
    username: ${RENALO_DEFAULT_ADMIN_USERNAME:admin}
