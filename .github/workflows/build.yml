name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v5
      - name: Install documentation dependencies
        working-directory: docs/user
        run: bun install --frozen-lockfile
      - name: Check and build documentation
        working-directory: docs/user
        run: bun run check && bun run build
      - name: Build
        run: ./gradlew build
      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: build/playwright-traces/**/*.zip
          if-no-files-found: ignore
      - name: Build container image tarball
        run: ./gradlew --no-configuration-cache jibBuildTar
      - name: Build documentation container image
        run: |
          docker build \
            --build-arg RENALO_DOCS_SITE_URL="${{ vars.RENALO_DOCS_SITE_URL }}" \
            --tag renalo-docs:ci \
            docs/user
      - name: Detect release version
        id: release_version
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          set -euo pipefail
          version="$(./gradlew -q printVersion | grep -E '^[0-9]+\.[0-9]+\.[0-9]+' | tail -n 1)"
          if [[ -z "$version" ]]; then
            echo "Could not determine Gradle project version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [[ "$version" == *-SNAPSHOT ]]; then
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Log in to Container registry
        uses: docker/login-action@v4
        if: ${{ github.ref == 'refs/heads/main' && steps.release_version.outputs.is_release == 'true' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish release image
        if: ${{ github.ref == 'refs/heads/main' && steps.release_version.outputs.is_release == 'true' }}
        run: ./gradlew --no-configuration-cache jib
      - name: Publish release documentation image
        if: ${{ github.ref == 'refs/heads/main' && steps.release_version.outputs.is_release == 'true' }}
        env:
          VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          docker tag renalo-docs:ci "ghcr.io/orange-buffalo/renalo-docs:${VERSION}"
          docker push "ghcr.io/orange-buffalo/renalo-docs:${VERSION}"
